name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install ecosystem packages (for smoke / integration tests)
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/pyproject.toml" ]; then
              pip install -e "$pkg" || echo "skipped $pkg"
            fi
          done

      - name: Install common test SDKs (mocked in tests — we just need imports)
        run: |
          pip install \
            httpx "pyjwt[crypto]" \
            gitpython docker slack_sdk notion_client jira \
            atlassian-python-api datadog-api-client beautifulsoup4 pypdf

      - name: Ruff check
        run: ruff check yagura tests

      - name: Ruff format check
        run: ruff format --check yagura tests

      - name: Pytest
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build

      - name: Build core wheel
        run: python -m build

      - name: Build each ecosystem package
        run: |
          for pkg in packages/*/; do
            if [ "$(basename "$pkg")" = "_shared" ]; then continue; fi
            if [ -f "$pkg/pyproject.toml" ]; then
              echo "::group::Building $pkg"
              (cd "$pkg" && python -m build)
              echo "::endgroup::"
            fi
          done

      - name: Collect built artifacts
        run: |
          mkdir -p collected
          cp dist/*.whl dist/*.tar.gz collected/ 2>/dev/null || true
          for pkg in packages/*/dist/; do
            cp "$pkg"/*.whl "$pkg"/*.tar.gz collected/ 2>/dev/null || true
          done
          ls -la collected/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: collected/
